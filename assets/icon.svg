<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: rounded terminal window -->
  <rect x="8" y="8" width="240" height="240" rx="28" ry="28" fill="#1a1f2b"/>
  <rect x="8" y="8" width="240" height="40" rx="28" ry="28" fill="#252b38"/>
  <rect x="8" y="36" width="240" height="14" fill="#252b38"/>

  <!-- Traffic light dots -->
  <circle cx="30" cy="28" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="28" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="28" r="6" fill="#27c93f"/>

  <!-- Log lines: each is timestamp dot + level bar + content bar -->
  <!-- TRACE (gray) -->
  <circle cx="28" cy="74" r="3" fill="#5c6370"/>
  <rect x="40" y="71" width="22" height="6" rx="2" fill="#5c6370"/>
  <rect x="68" y="71" width="120" height="6" rx="2" fill="#3a4150"/>

  <!-- DEBUG (dim) -->
  <circle cx="28" cy="92" r="3" fill="#7a8290"/>
  <rect x="40" y="89" width="22" height="6" rx="2" fill="#7a8290"/>
  <rect x="68" y="89" width="150" height="6" rx="2" fill="#4a5160"/>

  <!-- INFO (cyan) -->
  <circle cx="28" cy="110" r="3" fill="#56b6c2"/>
  <rect x="40" y="107" width="22" height="6" rx="2" fill="#56b6c2"/>
  <rect x="68" y="107" width="135" height="6" rx="2" fill="#abb2bf"/>

  <!-- WARN (yellow) — focused/highlighted band -->
  <rect x="14" y="124" width="228" height="20" rx="3" fill="#3a3220" opacity="0.9"/>
  <circle cx="28" cy="134" r="3" fill="#e5c07b"/>
  <rect x="40" y="131" width="22" height="6" rx="2" fill="#e5c07b"/>
  <rect x="68" y="131" width="160" height="6" rx="2" fill="#e5c07b" opacity="0.85"/>
  <!-- left selection bar -->
  <rect x="10" y="124" width="3" height="20" fill="#e5c07b"/>

  <!-- ERROR (red) -->
  <circle cx="28" cy="158" r="3" fill="#e06c75"/>
  <rect x="40" y="155" width="22" height="6" rx="2" fill="#e06c75"/>
  <rect x="68" y="155" width="145" height="6" rx="2" fill="#e06c75" opacity="0.7"/>

  <!-- ERROR continuation -->
  <circle cx="28" cy="176" r="3" fill="#e06c75"/>
  <rect x="40" y="173" width="22" height="6" rx="2" fill="#e06c75"/>
  <rect x="68" y="173" width="115" height="6" rx="2" fill="#e06c75" opacity="0.7"/>

  <!-- INFO -->
  <circle cx="28" cy="194" r="3" fill="#56b6c2"/>
  <rect x="40" y="191" width="22" height="6" rx="2" fill="#56b6c2"/>
  <rect x="68" y="191" width="125" height="6" rx="2" fill="#abb2bf"/>

  <!-- DEBUG -->
  <circle cx="28" cy="212" r="3" fill="#7a8290"/>
  <rect x="40" y="209" width="22" height="6" rx="2" fill="#7a8290"/>
  <rect x="68" y="209" width="155" height="6" rx="2" fill="#4a5160"/>

  <!-- Status bar at bottom -->
  <rect x="8" y="226" width="240" height="22" rx="0" fill="#3a4150"/>
  <rect x="8" y="226" width="240" height="22" rx="0" fill="#3a4150"/>
  <text x="20" y="242" font-family="monospace" font-size="13" font-weight="700" fill="#abb2bf">m</text>
  <text x="32" y="242" font-family="monospace" font-size="13" fill="#56b6c2">less</text>
  <text x="76" y="242" font-family="monospace" font-size="11" fill="#7a8290">L42 [WRN ERR]</text>

  <!-- bottom-right rounded corner mask -->
  <path d="M 248 226 L 248 220 Q 248 248 220 248 L 240 248 Q 248 248 248 240 Z" fill="#1a1f2b"/>
</svg>
