# GoReleaser config for mless
# Docs: https://goreleaser.com
# Test locally without tagging: goreleaser release --snapshot --clean
version: 2

project_name: mless

before:
  hooks:
    - go mod tidy

builds:
  - id: mless
    main: ./cmd/mless
    binary: mless
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .Date }}

archives:
  - id: mless
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}macos
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE*
      - CLAUDE.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: TimelordUK
    name: mless
  draft: false
  prerelease: auto
  header: |
    ## mless {{ .Tag }}

    Enhanced `less` for log files — level filtering, time navigation, slicing, split views.
  footer: |
    ---
    Install: download the archive for your OS/arch below, extract, and put `mless` on your `PATH`.

homebrew_casks:
  - name: mless
    repository:
      owner: TimelordUK
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
      branch: main
    homepage: https://github.com/TimelordUK/mless
    description: A modern log-aware pager for the terminal — less, but for log files.
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Cask update for {{ .ProjectName }} version {{ .Tag }}"

chocolateys:
  - name: mless
    title: mless
    authors: TimelordUK
    project_url: https://github.com/TimelordUK/mless
    project_source_url: https://github.com/TimelordUK/mless
    docs_url: https://github.com/TimelordUK/mless/blob/master/README.md
    bug_tracker_url: https://github.com/TimelordUK/mless/issues
    license_url: https://github.com/TimelordUK/mless/blob/master/LICENSE
    icon_url: https://raw.githubusercontent.com/TimelordUK/mless/master/assets/icon.png
    summary: A modern, log-aware pager for the terminal — less, but for log files.
    description: |
      mless is a TUI pager focused on log files. It detects and color-codes log
      levels, supports level filtering ("show WARN and above"), live fzf-style
      text filtering, search, marks, time navigation, and a stack of revertable
      slices for drilling into sub-ranges of a file. Split views give each pane
      independent filters; consolidated mode (-C) merge-tails multiple files in
      time order. Vim-style keys, count prefixes, visual selection, and
      clipboard yank are supported.
    tags: "log logs viewer pager less terminal cli tui devops sre observability"
    release_notes: "https://github.com/TimelordUK/mless/releases/tag/v{{ .Version }}"
    api_key: '{{ .Env.CHOCOLATEY_API_KEY }}'
    source_repo: "https://push.chocolatey.org/"
    skip_publish: false
